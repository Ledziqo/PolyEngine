services:
  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_ENGINE_URL: ${NEXT_PUBLIC_ENGINE_URL:-http://engine:8000}
    ports:
      - "3000:3000"
    depends_on:
      - engine

  engine:
    build:
      context: ./apps/engine
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://polyengine:change-me@postgres:5432/polyengine}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENGINE_CORS_ORIGINS: ${ENGINE_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polyengine}
      POSTGRES_USER: ${POSTGRES_USER:-polyengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
